services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://tmdb:tmdb@postgres:5432/tmdb
      REDIS_URL: redis://redis:6379
      TMDB_API_TOKEN: ${TMDB_API_TOKEN}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-admin-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tmdb
      POSTGRES_PASSWORD: tmdb
      POSTGRES_DB: tmdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tmdb']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
